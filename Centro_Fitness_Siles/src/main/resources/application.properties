spring.application.name=Centro_Fitness_Siles

# Puerto requerido 
server.port=47

# Conexion a MySQL 
spring.datasource.url=jdbc:mysql://localhost:3306/gimnasio_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Thymeleaf con cache off
spring.thymeleaf.cache=false