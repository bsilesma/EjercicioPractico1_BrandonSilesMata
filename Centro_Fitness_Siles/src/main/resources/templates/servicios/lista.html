<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Clases - Centro Fitness Siles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>
    <body>

        <div th:replace="~{fragmentos :: header}"></div>
        <div th:replace="~{fragmentos :: navbar}"></div>

        <main class="container py-4">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3" style="color:#034AA6;">Clases de Entrenamiento</h1>
                <a href="/servicios/nueva" class="btn btn-acento">Nueva Clase</a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered table-cfs">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Categoria</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="servicio : ${servicios}">
                        <td th:text="${servicio.id}"></td>
                        <td th:text="${servicio.nombre}"></td>
                        <td th:text="${'₡' + servicio.precio}"></td>
                        <td th:text="${servicio.categoria.nombre}"></td>
                        <td>
                            <a th:href="@{/servicios/editar/{id}(id=${servicio.id})}"
                               class="btn btn-sm btn-outline-primary">Editar</a>
                            <a th:href="@{/servicios/eliminar/{id}(id=${servicio.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Eliminar esta clase?');">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${servicios == null or servicios.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">No hay clases registradas.</td>
                    </tr>
                </tbody>
            </table>

        </main>

        <div th:replace="~{fragmentos :: footer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
