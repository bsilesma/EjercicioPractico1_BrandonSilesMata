<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Clase - Centro Fitness Siles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>
    <body>

        <div th:replace="~{fragmentos :: header}"></div>
        <div th:replace="~{fragmentos :: navbar}"></div>

        <main class="container py-4">

            <h1 class="h3 mb-3" style="color:#034AA6;"
                th:text="${servicio.id == null} ? 'Nueva Clase' : 'Editar Clase'">
            </h1>

            <form th:action="@{/servicios}" th:object="${servicio}" method="post" class="col-md-6">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required maxlength="100">
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio (₡)</label>
                    <input type="number" step="0.01" min="0" th:field="*{precio}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option value="">Seleccione una categoria...</option>
                        <option th:each="cat : ${categorias}"
                                th:value="${cat.id}"
                                th:text="${cat.nombre}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-acento">Guardar</button>
                <a href="/servicios" class="btn btn-outline-secondary">Cancelar</a>
            </form>

        </main>

        <div th:replace="~{fragmentos :: footer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
