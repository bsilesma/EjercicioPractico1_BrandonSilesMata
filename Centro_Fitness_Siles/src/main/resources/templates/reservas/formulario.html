<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nueva Reserva - Centro Fitness Siles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>
    <body>

        <div th:replace="~{fragmentos :: header}"></div>
        <div th:replace="~{fragmentos :: navbar}"></div>

        <main class="container py-4">

            <h1 class="h3 mb-3" style="color:#034AA6;">Nueva Reserva</h1>

            <form th:action="@{/reservas}" th:object="${reserva}" method="post" class="col-md-6">

                <div class="mb-3">
                    <label class="form-label">Nombre del Cliente</label>
                    <input type="text" th:field="*{nombreCliente}" class="form-control" required maxlength="100">
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" th:field="*{fecha}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Clase</label>
                    <select th:field="*{servicio}" class="form-select" required>
                        <option value="">Seleccione una clase...</option>
                        <option th:each="serv : ${servicios}"
                                th:value="${serv.id}"
                                th:text="${serv.nombre}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-acento">Reservar</button>
                <a href="/reservas" class="btn btn-outline-secondary">Cancelar</a>
            </form>

        </main>

        <div th:replace="~{fragmentos :: footer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
