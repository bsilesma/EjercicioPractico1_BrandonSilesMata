<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reservas - Centro Fitness Siles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>
    <body>

        <div th:replace="~{fragmentos :: header}"></div>
        <div th:replace="~{fragmentos :: navbar}"></div>

        <main class="container py-4">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3" style="color:#034AA6;">Reservas</h1>
                <a href="/reservas/nueva" class="btn btn-acento">Nueva Reserva</a>
            </div>

            <table class="table table-bordered table-cfs">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Clase</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${reserva.id}"></td>
                        <td th:text="${reserva.nombreCliente}"></td>
                        <td th:text="${#temporals.format(reserva.fecha, 'dd/MM/yyyy')}"></td>
                        <td th:text="${reserva.servicio.nombre}"></td>
                        <td>
                            <a th:href="@{/reservas/eliminar/{id}(id=${reserva.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Eliminar esta reserva?');">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${reservas == null or reservas.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">No hay reservas registradas.</td>
                    </tr>
                </tbody>
            </table>

        </main>

        <div th:replace="~{fragmentos :: footer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
