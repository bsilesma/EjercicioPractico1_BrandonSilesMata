<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contacto - Centro Fitness Siles</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>
    <body>

        <div th:replace="~{fragmentos :: header}"></div>
        <div th:replace="~{fragmentos :: navbar}"></div>

        <main class="container py-4">

            <h1 class="h3 mb-3" style="color:#034AA6;">Quejas y Sugerencias</h1>

            <p class="text-muted">
                Tu opinion nos ayuda a mejorar. Completa el formulario y nos pondremos en contacto contigo.
            </p>

            <div th:if="${param.enviado}" class="alert alert-success">
                ¡Gracias! Tu mensaje fue enviado correctamente.
            </div>

            <form th:action="@{/contacto}" method="post" class="col-md-6">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required maxlength="100">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo Electronico</label>
                    <input type="email" name="correo" class="form-control" required maxlength="150">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea name="mensaje" class="form-control" rows="4" required maxlength="500"></textarea>
                </div>

                <button type="submit" class="btn btn-acento">Enviar</button>
            </form>

        </main>

        <div th:replace="~{fragmentos :: footer}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
